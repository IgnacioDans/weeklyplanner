<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificador de Menú</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      background: #EFEEE8;
      color: #211F1A;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    const { useState, useEffect, useMemo, useRef } = React;
    
    const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
    const AC_OPCIONES = ["Libre", "AC Grupos", "AC Tamizaje", "AC Quintana"];
    const MESES = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
    const CLAVE = "planificador-semanal-v2";
    
    const semanaVacia = () =>
      Object.fromEntries(DIAS.map((d) => [d, { comida: null, ac: "Libre" }]));
    
    const C = {
      bg: "#EFEEE8",
      surface: "#FFFFFF",
      ink: "#211F1A",
      sub: "#837D72",
      line: "#E4E1D8",
      green: "#2F5D4F",
      greenSoft: "#E7EFEA",
      comida: "#B96C1E",
      comidaSoft: "#F7EBDA",
      cena: "#584B86",
      cenaSoft: "#EBE8F3",
      rojo: "#B4453A",
      ac: {
        Libre: { fg: "#2F5D4F", bg: "#E7EFEA" },
        "AC Grupos": { fg: "#1F5673", bg: "#E0EEF5" },
        "AC Tamizaje": { fg: "#8A5A1F", bg: "#F6EBDA" },
        "AC Quintana": { fg: "#7A3B6B", bg: "#F3E3EF" },
      },
    };
    
    const uid = () => Math.random().toString(36).slice(2, 10);
    const norm = (s) => (s || "").trim().toLowerCase();
    const eur = (n) => new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR" }).format(n || 0);
    const hoyISO = () => new Date().toISOString().slice(0, 10);
    const etiquetaMes = (k) => {
      const [y, m] = k.split("-");
      return `${MESES[+m - 1]} ${y.slice(2)}`;
    };
    const fechaCorta = (iso) => {
      const [y, m, d] = iso.split("-");
      return `${d}/${m}`;
    };
    
    const FONT = '-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif';

    function App() {
      const [tab, setTab] = useState("semana");
      const [cargado, setCargado] = useState(false);
      const [recetas, setRecetas] = useState([]);
      const [semana, setSemana] = useState(semanaVacia());
      const [cenas, setCenas] = useState([]);
      const [otros, setOtros] = useState([]);
      const [extra, setExtra] = useState([]);
      const [comprados, setComprados] = useState({});
      const [retirados, setRetirados] = useState({});
      const [compras, setCompras] = useState([]);
      const [picker, setPicker] = useState(null);
      const [editorReceta, setEditorReceta] = useState(null);
      const [editorCompra, setEditorCompra] = useState(null);
      const [confirmarSemana, setConfirmarSemana] = useState(false);
      const [compraHecha, setCompraHecha] = useState(false);
      
      // Carga desde localStorage
      useEffect(() => {
        try {
          const d = JSON.parse(localStorage.getItem(CLAVE) || "{}");
          if (d.recetas) setRecetas(d.recetas);
          if (d.semana) setSemana({ ...semanaVacia(), ...d.semana });
          if (d.cenas) setCenas(d.cenas);
          if (d.otros) setOtros(d.otros);
          if (d.extra) setExtra(d.extra);
          if (d.comprados) setComprados(d.comprados);
          if (d.retirados) setRetirados(d.retirados);
          if (d.compras) setCompras(d.compras);
        } catch (e) {}
        setCargado(true);
      }, []);
      
      // Guardado automático
      useEffect(() => {
        if (!cargado) return;
        localStorage.setItem(CLAVE, JSON.stringify({ recetas, semana, cenas, otros, extra, comprados, retirados, compras }));
      }, [recetas, semana, cenas, otros, extra, comprados, retirados, compras, cargado]);
      
      const cargarDatos = (d) => {
        setRecetas(d.recetas || []);
        setSemana({ ...semanaVacia(), ...(d.semana || {}) });
        setCenas(d.cenas || []);
        setOtros(d.otros || []);
        setExtra(d.extra || []);
        setComprados(d.comprados || {});
        setRetirados(d.retirados || {});
        setCompras(d.compras || []);
      };
      
      const ingredientesAuto = useMemo(() => {
        const mapa = new Map();
        const add = (recetaId) => {
          const rec = recetas.find((x) => x.id === recetaId);
          if (!rec) return;
          rec.ingredientes.forEach((ing) => {
            const k = norm(ing);
            if (!k) return;
            if (mapa.has(k)) mapa.get(k).veces += 1;
            else mapa.set(k, { clave: k, nombre: ing.trim(), veces: 1 });
          });
        };
        DIAS.forEach((d) => semana[d].comida && add(semana[d].comida));
        cenas.forEach((c) => add(c.recetaId));
        return [...mapa.values()].filter((i) => !retirados[i.clave]).sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
      }, [semana, cenas, recetas, retirados]);
      
      const pendientes = ingredientesAuto.filter((i) => !comprados[i.clave]).length + extra.filter((i) => !i.hecho).length + otros.filter((i) => !i.hecho).length;
      
      const marcados = useMemo(() => ({
        auto: ingredientesAuto.filter((i) => comprados[i.clave]),
        extra: extra.filter((i) => i.hecho),
        otros: otros.filter((i) => i.hecho),
      }), [ingredientesAuto, comprados, extra, otros]);
      const nMarcados = marcados.auto.length + marcados.extra.length + marcados.otros.length;
      
      const limpiarMarcados = () => {
        setRetirados((p) => { const n = { ...p }; marcados.auto.forEach((i) => (n[i.clave] = true)); return n; });
        setComprados((p) => { const n = { ...p }; marcados.auto.forEach((i) => delete n[i.clave]); return n; });
        setExtra((p) => p.filter((i) => !i.hecho));
        setOtros((p) => p.filter((i) => !i.hecho));
      };
      
      const exportar = async () => {
        const data = datosJSON();
        try {
          const file = new File([data], "planificador.json", { type: "application/json" });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: "Planificador" });
            return;
          }
        } catch (e) { return; }
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "planificador.json";
        a.click();
        URL.revokeObjectURL(url);
      };
      
      const importar = (file) => {
        const reader = new FileReader();
        reader.onload = () => {
          try { cargarDatos(JSON.parse(reader.result)); }
          catch (e) { alert("No se pudo leer el archivo."); }
        };
        reader.readAsText(file);
      };
      
      const datosJSON = () => JSON.stringify({ recetas, semana, cenas, otros, extra, comprados, retirados, compras }, null, 2);
      
      const asignarComida = (dia, recetaId) => setSemana((p) => ({ ...p, [dia]: { ...p[dia], comida: recetaId } }));
      const cambiarAC = (dia, ac) => setSemana((p) => ({ ...p, [dia]: { ...p[dia], ac } }));
      const addCena = (recetaId) => setCenas((p) => [...p, { id: uid(), recetaId, hecha: false }]);
      const nuevaSemana = () => {
        setSemana(semanaVacia());
        setCenas([]);
        setOtros([]);
        setExtra([]);
        setComprados({});
        setRetirados({});
        setConfirmarSemana(false);
        setTab("semana");
      };
      const borrarReceta = (id) => {
        setRecetas((p) => p.filter((r) => r.id !== id));
        setSemana((p) => { const n = { ...p }; DIAS.forEach((d) => n[d].comida === id && (n[d] = { ...n[d], comida: null })); return n; });
        setCenas((p) => p.filter((c) => c.recetaId !== id));
      };
      const guardarReceta = (datos) => {
        const nueva = !datos.id;
        const id = datos.id || uid();
        const completa = { ...datos, id };
        if (nueva) setRecetas((p) => [...p, completa]);
        else setRecetas((p) => p.map((r) => (r.id === id ? completa : r)));
        if (editorReceta?.desde) {
          if (editorReceta.desde.tipo === "comida") asignarComida(editorReceta.desde.dia, id);
          else addCena(id);
          setPicker(null);
        }
        setEditorReceta(null);
      };
      
      if (!cargado) return React.createElement("div", { style: { ...s.pantalla, alignItems: "center", justifyContent: "center" } },
        React.createElement("span", { style: { marginTop: 10, color: C.sub, fontSize: 14 } }, "Cargando…")
      );
      
      const vistaSemana = tab === "semana" ? React.createElement(VistaSemana, {
        semana, cenas, recetas,
        onComida: (dia) => setPicker({ tipo: "comida", dia }),
        onAC: cambiarAC,
        onAddCena: () => setPicker({ tipo: "cena" }),
        onToggleCena: (id) => setCenas((p) => p.map((c) => (c.id === id ? { ...c, hecha: !c.hecha } : c))),
        onQuitarCena: (id) => setCenas((p) => p.filter((c) => c.id !== id)),
        onNueva: () => setConfirmarSemana(true),
      }) : null;
      
      const vistaCompra = tab === "compra" ? React.createElement(VistaCompra, {
        ingredientesAuto, comprados, setComprados, extra, setExtra, otros, setOtros,
        nMarcados,
        onCompraHecha: () => setCompraHecha(true),
      }) : null;
      
      const vistaRecetario = tab === "recetario" ? React.createElement(VistaRecetario, {
        recetas,
        onNueva: (tipo) => setEditorReceta({ tipo }),
        onEditar: (r) => setEditorReceta({ tipo: r.tipo, receta: r }),
        onBorrar: borrarReceta,
      }) : null;
      
      const vistaRegistro = tab === "registro" ? React.createElement(VistaRegistro, {
        compras, recetas,
        onNueva: () => setEditorCompra({ prefill: null }),
        onEditar: (c) => setEditorCompra({ compra: c }),
        onBorrar: (id) => setCompras((p) => p.filter((c) => c.id !== id)),
        onExportar: exportar,
        onImportar: importar,
      }) : null;
      
      return React.createElement("div", { style: s.pantalla },
        React.createElement("div", { style: s.contenedor },
          vistaSemana, vistaCompra, vistaRecetario, vistaRegistro
        ),
        React.createElement("nav", { style: s.tabbar },
          React.createElement(TabBtn, { label: "Semana", activo: tab === "semana", onClick: () => setTab("semana") }),
          React.createElement(TabBtn, { label: "Compra", activo: tab === "compra", onClick: () => setTab("compra"), badge: pendientes }),
          React.createElement(TabBtn, { label: "Recetario", activo: tab === "recetario", onClick: () => setTab("recetario") }),
          React.createElement(TabBtn, { label: "Registro", activo: tab === "registro", onClick: () => setTab("registro") })
        ),
        picker && React.createElement(SelectorReceta, {
          picker, recetas,
          asignado: picker.tipo === "comida" ? semana[picker.dia].comida : null,
          onElegir: (id) => { picker.tipo === "comida" ? asignarComida(picker.dia, id) : addCena(id); setPicker(null); },
          onQuitar: picker.tipo === "comida" && semana[picker.dia].comida ? () => { asignarComida(picker.dia, null); setPicker(null); } : null,
          onNueva: () => setEditorReceta({ tipo: picker.tipo, desde: { ...picker } }),
          onCerrar: () => setPicker(null),
        }),
        editorReceta && React.createElement(EditorReceta, { inicial: editorReceta, onGuardar: guardarReceta, onCerrar: () => setEditorReceta(null) }),
        editorCompra && React.createElement(EditorCompra, {
          inicial: editorCompra,
          supermercados: [...new Set(compras.map((c) => c.supermercado).filter(Boolean))],
          onGuardar: (compra) => {
            if (compra.id) setCompras((p) => p.map((c) => (c.id === compra.id ? compra : c)));
            else setCompras((p) => [...p, { ...compra, id: uid() }]);
            if (editorCompra.cleanup) limpiarMarcados();
            setEditorCompra(null);
          },
          onCerrar: () => setEditorCompra(null),
        }),
        confirmarSemana && React.createElement(Modal, { onCerrar: () => setConfirmarSemana(false), titulo: "Empezar semana nueva" },
          React.createElement("p", { style: s.parrafo }, "Se borran las comidas de cada día, las cenas, las guardias de Marina y toda la lista de la compra. El recetario y el registro de gastos se mantienen."),
          React.createElement("div", { style: { display: "flex", gap: 10 } },
            React.createElement("button", { style: s.btnSec, onClick: () => setConfirmarSemana(false) }, "Cancelar"),
            React.createElement("button", { style: { ...s.btnPrim, background: C.rojo, flex: 1 }, onClick: nuevaSemana }, "Vaciar semana")
          )
        ),
        compraHecha && React.createElement(Modal, { onCerrar: () => setCompraHecha(false), titulo: "Compra hecha" },
          React.createElement("p", { style: s.parrafo }, `Se quitarán de la lista los ${nMarcados} elemento${nMarcados === 1 ? "" : "s"} que has marcado. ¿Quieres anotar antes cuánto ha costado para el registro de gastos?`),
          React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
            React.createElement("button", { style: { ...s.btnPrim, background: C.green }, onClick: () => {
              setEditorCompra({
                cleanup: true,
                prefill: [
                  ...marcados.auto.map((i) => ({ nombre: i.nombre })),
                  ...marcados.extra.map((i) => ({ nombre: i.texto })),
                  ...marcados.otros.map((i) => ({ nombre: i.texto })),
                ],
              });
              setCompraHecha(false);
            } }, "Anotar precios y borrar"),
            React.createElement("button", { style: s.btnSec, onClick: () => { limpiarMarcados(); setCompraHecha(false); } }, "Solo borrar de la lista")
          )
        )
      );
    }

    // Componentes UI simplificados (versión compacta para este HTML)
    function VistaSemana({ semana, cenas, recetas, onComida, onAC, onAddCena, onToggleCena, onQuitarCena, onNueva }) {
      const nombre = (id) => recetas.find((r) => r.id === id)?.nombre;
      return React.createElement(React.Fragment, null,
        React.createElement(Cabecera, { titulo: "Menú de la semana", subtitulo: "Comidas por día · cenas en lista para ir asignando", accion: React.createElement("button", { style: s.btnCabecera, onClick: onNueva }, "Nueva semana") }),
        React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
          DIAS.map((dia) => React.createElement("div", { key: dia, style: s.card },
            React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 } },
              React.createElement("span", { style: { fontSize: 17, fontWeight: 650, color: C.ink, letterSpacing: -0.2 } }, dia),
              React.createElement(ChipAC, { valor: semana[dia].ac, onChange: (v) => onAC(dia, v) })
            ),
            React.createElement(Slot, { tipo: "comida", nombre: nombre(semana[dia].comida), onClick: () => onComida(dia) })
          ))
        ),
        React.createElement("div", { style: { ...s.card, marginTop: 16 } },
          React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 4 } },
            React.createElement("h2", { style: { fontSize: 15.5, fontWeight: 700, color: C.ink, margin: 0 } }, "Cenas de la semana")
          ),
          React.createElement("p", { style: { color: C.sub, fontSize: 13, margin: "0 0 12px" } }, "Tacha cada cena cuando la asignéis a un día sobre la marcha."),
          cenas.length === 0 && React.createElement("p", { style: { color: C.sub, fontSize: 13.5, margin: "0 0 12px" } }, "Aún no hay cenas. Añade las que os apetezcan esta semana."),
          React.createElement("div", { style: { display: "flex", flexDirection: "column" } },
            cenas.map((c) => React.createElement("div", { key: c.id, style: { display: "flex", alignItems: "center", gap: 11, padding: "9px 0", borderBottom: `1px solid ${C.line}` } },
              React.createElement("button", { onClick: () => onToggleCena(c.id), style: { width: 23, height: 23, borderRadius: 999, border: `2px solid ${c.hecha ? C.cena : C.line}`, background: c.hecha ? C.cena : "transparent", display: "grid", placeItems: "center", cursor: "pointer", flexShrink: 0, padding: 0 } }, c.hecha ? "✓" : ""),
              React.createElement("span", { style: { flex: 1, fontSize: 15, color: c.hecha ? C.sub : C.ink, textDecoration: c.hecha ? "line-through" : "none" } }, nombre(c.recetaId) || "Receta eliminada"),
              React.createElement("button", { onClick: () => onQuitarCena(c.id), style: s.iconoBtn }, "✕")
            ))
          ),
          React.createElement("button", { onClick: onAddCena, style: { ...s.btnDashed, marginTop: 14 } }, "+ Añadir cena")
        )
      );
    }

    function VistaCompra({ ingredientesAuto, comprados, setComprados, extra, setExtra, otros, setOtros, nMarcados, onCompraHecha }) {
      const [nuevoIng, setNuevoIng] = useState("");
      const [nuevoOtro, setNuevoOtro] = useState("");
      const toggleAuto = (clave) => setComprados((p) => ({ ...p, [clave]: !p[clave] }));
      const addExtra = () => { const t = nuevoIng.trim(); if (!t) return; setExtra((p) => [...p, { id: uid(), texto: t, hecho: false }]); setNuevoIng(""); };
      const addOtro = () => { const t = nuevoOtro.trim(); if (!t) return; setOtros((p) => [...p, { id: uid(), texto: t, hecho: false }]); setNuevoOtro(""); };
      const vacio = ingredientesAuto.length === 0 && extra.length === 0 && otros.length === 0;
      return React.createElement(React.Fragment, null,
        React.createElement(Cabecera, { titulo: "Lista de la compra", subtitulo: "Los ingredientes se rellenan solos desde el menú" }),
        vacio && React.createElement("div", { style: s.vacio }, React.createElement("p", { style: { margin: "12px 0 0", color: C.sub, fontSize: 14.5, lineHeight: 1.5 } }, "Asigna comidas y cenas en la pestaña Semana y sus ingredientes aparecerán aquí.")),
        !vacio && React.createElement(Seccion, { titulo: "Ingredientes", color: C.green },
          ingredientesAuto.map((i) => React.createElement(Fila, { key: i.clave, texto: i.nombre, extra: i.veces > 1 ? `×${i.veces}` : null, hecho: !!comprados[i.clave], onToggle: () => toggleAuto(i.clave) })),
          extra.map((i) => React.createElement(Fila, { key: i.id, texto: i.texto, hecho: i.hecho, onToggle: () => setExtra((p) => p.map((x) => (x.id === i.id ? { ...x, hecho: !x.hecho } : x))), onBorrar: () => setExtra((p) => p.filter((x) => x.id !== i.id)) })),
          React.createElement(EntradaAñadir, { valor: nuevoIng, setValor: setNuevoIng, onAdd: addExtra, placeholder: "Añadir ingrediente suelto" })
        ),
        React.createElement(Seccion, { titulo: "Otros", color: C.cena },
          otros.length === 0 && React.createElement("p", { style: { color: C.sub, fontSize: 13.5, margin: "2px 0 10px" } }, "Limpieza, papel, bolsas… lo que no sea ingrediente."),
          otros.map((i) => React.createElement(Fila, { key: i.id, texto: i.texto, hecho: i.hecho, onToggle: () => setOtros((p) => p.map((x) => (x.id === i.id ? { ...x, hecho: !x.hecho } : x))), onBorrar: () => setOtros((p) => p.filter((x) => x.id !== i.id)) })),
          React.createElement(EntradaAñadir, { valor: nuevoOtro, setValor: setNuevoOtro, onAdd: addOtro, placeholder: "Añadir artículo" })
        ),
        nMarcados > 0 && React.createElement("button", { style: { ...s.btnPrim, background: C.green, width: "100%", marginTop: 4 }, onClick: onCompraHecha }, `Compra hecha (${nMarcados})`)
      );
    }

    function Fila({ texto, extra, hecho, onToggle, onBorrar }) {
      return React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 11, padding: "9px 0", borderBottom: `1px solid ${C.line}` } },
        React.createElement("button", { onClick: onToggle, style: { width: 23, height: 23, borderRadius: 999, border: `2px solid ${hecho ? C.green : C.line}`, background: hecho ? C.green : "transparent", display: "grid", placeItems: "center", cursor: "pointer", flexShrink: 0, padding: 0 } }, hecho ? "✓" : ""),
        React.createElement("span", { style: { flex: 1, fontSize: 15, color: hecho ? C.sub : C.ink, textDecoration: hecho ? "line-through" : "none" } }, texto),
        extra && React.createElement("span", { style: { fontSize: 12.5, color: C.sub, fontWeight: 600 } }, extra),
        onBorrar && React.createElement("button", { onClick: onBorrar, style: s.iconoBtn }, "✕")
      );
    }

    function EntradaAñadir({ valor, setValor, onAdd, placeholder }) {
      return React.createElement("div", { style: { display: "flex", gap: 8, marginTop: 12 } },
        React.createElement("input", { value: valor, onChange: (e) => setValor(e.target.value), onKeyDown: (e) => e.key === "Enter" && onAdd(), placeholder, style: s.input }),
        React.createElement("button", { onClick: onAdd, style: s.btnAdd }, "+")
      );
    }

    function VistaRecetario({ recetas, onNueva, onEditar, onBorrar }) {
      const [filtro, setFiltro] = useState("todas");
      const lista = recetas.filter((r) => filtro === "todas" || r.tipo === filtro).sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
      return React.createElement(React.Fragment, null,
